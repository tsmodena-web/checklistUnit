<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Smart AC Calculator</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

body{
    background:#f5f7fb;
}

canvas{
    width:100%;
    height:400px;
    border:2px dashed #0d6efd;
    border-radius:10px;
    background:white;
    touch-action:none;
    cursor:crosshair;
}

.card{
    border:none;
    border-radius:15px;
}

.result-item{
    padding:10px;
    background:#eef5ff;
    border-radius:8px;
    margin-bottom:10px;
}

</style>

</head>

<body>

<div class="container py-4">

<div class="card shadow">

<div class="card-header bg-primary text-white">

<h3 class="mb-0">❄ Smart AC Calculator</h3>

</div>

<div class="card-body">

<div class="row">

<div class="col-lg-4">

<div class="mb-3">
<label>Panjang (m)</label>
<input id="p" class="form-control" type="number" value="5">
</div>

<div class="mb-3">
<label>Lebar (m)</label>
<input id="l" class="form-control" type="number" value="4">
</div>

<div class="mb-3">
<label>Tinggi (m)</label>
<input id="t" class="form-control" type="number" value="3">
</div>

<div class="d-grid gap-2">

<button class="btn btn-primary" onclick="calculate()">
Hitung
</button>

<button class="btn btn-warning" onclick="clearCanvas()">
Clear Drawing
</button>

<button class="btn btn-success" onclick="downloadPNG()">
Download PNG
</button>

</div>

<hr>

<div class="result-item">
Luas :
<b id="luas"></b> m²
</div>

<div class="result-item">
Volume :
<b id="volume"></b> m³
</div>

<div class="result-item">
BTU :
<b id="btu"></b>
</div>

<div class="result-item">
Rekomendasi :
<b id="pk"></b>
</div>

</div>

<div class="col-lg-8">

<h5>Draw Room Layout</h5>

<canvas id="canvas" width="800" height="450"></canvas>

<p class="text-muted mt-2">
Mouse / Jari HP bisa langsung menggambar.
</p>

</div>

</div>

</div>

</div>

</div>

<script>

function calculate(){

let p=+document.getElementById("p").value;
let l=+document.getElementById("l").value;
let t=+document.getElementById("t").value;

let luas=p*l;
let volume=luas*t;
let btu=Math.round(volume*200);

let pk=">2 PK";

if(btu<=5000) pk="0.5 PK";
else if(btu<=7000) pk="0.75 PK";
else if(btu<=9000) pk="1 PK";
else if(btu<=12000) pk="1.5 PK";
else if(btu<=18000) pk="2 PK";

document.getElementById("luas").innerHTML=luas;
document.getElementById("volume").innerHTML=volume;
document.getElementById("btu").innerHTML=btu;
document.getElementById("pk").innerHTML=pk;

}

calculate();

const canvas=document.getElementById("canvas");
const ctx=canvas.getContext("2d");

ctx.lineWidth=2;
ctx.lineCap="round";
ctx.strokeStyle="#0d6efd";

let drawing=false;

function getPos(e){

const rect=canvas.getBoundingClientRect();

return{

x:e.clientX-rect.left,
y:e.clientY-rect.top

};

}

canvas.addEventListener("pointerdown",(e)=>{

drawing=true;

let p=getPos(e);

ctx.beginPath();

ctx.moveTo(p.x,p.y);

});

canvas.addEventListener("pointermove",(e)=>{

if(!drawing) return;

let p=getPos(e);

ctx.lineTo(p.x,p.y);

ctx.stroke();

});

window.addEventListener("pointerup",()=>{

drawing=false;

});

function clearCanvas(){

ctx.clearRect(0,0,canvas.width,canvas.height);

}

function downloadPNG(){

let link=document.createElement("a");

link.download="room-layout.png";

link.href=canvas.toDataURL();

link.click();

}

</script>

</body>
</html>
